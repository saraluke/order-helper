<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Luke Creative — Order Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink-light: #F3C4D6; --navy: #394350; --pink-dark: #D56D85;
    --green: #58634F; --tangerine: #E49855; --bg: #faf8f6;
    --card: #ffffff; --border: #e8e0d8; --text: #2a2420; --muted: #8a7f78;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--navy); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--pink-dark); }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--pink-light); font-weight: 400; }
  header .subtitle { font-size: 0.7rem; color: var(--pink-dark); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #refresh-btn { background: transparent; border: 1px solid var(--pink-dark); color: var(--pink-light); padding: 6px 14px; border-radius: 3px; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  #refresh-btn:hover { background: var(--pink-dark); color: white; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; display: inline-block; }
  .status-dot.loaded { background: #7cb87c; }
  .status-dot.loading { background: var(--tangerine); animation: pulse 1s infinite; }
  .status-dot.error { background: #c97070; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
  .loading-state, .error-state { text-align: center; padding: 80px 24px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--pink-dark); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .order-count { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-right: auto; }
  .filter-btn { background: white; border: 1.5px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .filter-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
  .filter-btn.done-toggle.active { background: var(--muted); border-color: var(--muted); color: white; }
  .order-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; overflow: hidden; transition: box-shadow 0.2s, border-color 0.2s, opacity 0.2s; }
  .order-card:hover { box-shadow: 0 4px 16px rgba(57,67,80,0.08); border-color: var(--pink-light); }
  .order-card.done { opacity: 0.45; }
  .order-card.done .order-name { text-decoration: line-through; color: var(--muted); }
  .order-card.hidden { display: none; }
  .card-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; gap: 16px; }
  .card-header:hover { background: #fdf9fb; }
  .order-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--navy); min-width: 160px; transition: all 0.2s; }
  .order-meta { font-size: 0.72rem; color: var(--muted); font-weight: 400; display: flex; gap: 16px; flex: 1; flex-wrap: wrap; }
  .order-meta span { display: flex; align-items: center; gap: 4px; }
  .badge { font-size: 0.62rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .badge-type { background: #eef0eb; color: var(--green); }
  .badge-design { background: #faeef2; color: var(--pink-dark); }
  .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
  .order-card.open .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 0 20px 18px; border-top: 1px solid var(--border); }
  .order-card.open .card-body { display: block; }
  .section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 600; margin: 14px 0 6px; }
  .custom-info-box { background: #f8f5f2; border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; font-size: 0.82rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: 'Montserrat', sans-serif; }
  .folder-path { font-size: 0.72rem; color: var(--muted); font-family: 'Courier New', monospace; word-break: break-all; background: #f8f5f2; padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); }
  .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: #2a3140; }
  .btn-secondary { background: white; color: var(--navy); border: 1.5px solid var(--navy); }
  .btn-secondary:hover { background: var(--navy); color: white; }
  .btn-accent { background: var(--pink-dark); color: white; }
  .btn-accent:hover { background: #c45e76; }
  .btn-done { background: white; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-done:hover { background: #f0f0ee; }
  .btn-undone { background: var(--green); color: white; border: 1.5px solid var(--green); }
  .btn-undone:hover { background: #4a5442; }
  .btn.copied { background: var(--green) !important; border-color: var(--green) !important; color: white !important; }
  .row-num { font-size: 0.65rem; color: #ccc; font-weight: 500; min-width: 24px; text-align: right; flex-shrink: 0; }
  .date-label { font-size: 0.65rem; color: var(--muted); }
  .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Sara Luke Creative</h1>
    <div class="subtitle">Order Helper</div>
  </div>
  <div class="header-right">
    <span class="status-dot" id="status-dot"></span>
    <button id="refresh-btn" onclick="loadOrders()">↺ Refresh</button>
  </div>
</header>

<div class="main">
  <div id="toolbar" style="display:none">
    <div class="toolbar">
      <span class="order-count" id="order-count"></span>
      <div id="design-filters"></div>
      <button class="filter-btn done-toggle" id="done-toggle" onclick="toggleShowDone()">Show Completed</button>
    </div>
  </div>
  <div id="app">
    <div class="loading-state"><div class="spinner"></div>Loading orders...</div>
  </div>
</div>

<script>
var SHEET_ID = '1lPp2QcCsJwxn22X8gMlzjKsrNen2BFkb1kN8jVUxXOQ';
var ordersData = [];
var doneOrders = {};
var activeFilter = 'all';
var showDone = false;

try { var saved = localStorage.getItem('slc-done'); if (saved) doneOrders = JSON.parse(saved); } catch(e) {}

function saveDone() { try { localStorage.setItem('slc-done', JSON.stringify(doneOrders)); } catch(e) {} }

function setStatus(state) { document.getElementById('status-dot').className = 'status-dot ' + state; }

function parseCSV(text) {
  var rows = [], row = [], field = '', inQuotes = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i], next = text[i+1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n' || (ch === '\r' && next === '\n')) {
        row.push(field); field = '';
        rows.push(row); row = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function parseDate(str) {
  if (!str) return 0;
  var d = new Date(str);
  return isNaN(d.getTime()) ? 0 : d.getTime();
}

function formatDate(str) {
  if (!str) return '';
  var d = new Date(str);
  if (isNaN(d.getTime())) return '';
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}

function loadOrders() {
  setStatus('loading');
  var app = document.getElementById('app');
  document.getElementById('toolbar').style.display = 'none';
  app.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading orders...</div>';
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';
  fetch(url).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.text();
  }).then(function(text) {
    var rows = parseCSV(text);
    ordersData = [];
    rows.forEach(function(row, i) {
      var name = (row[0] || '').trim();
      if (name && name !== 'Name') {
        ordersData.push({
          id: (row[4] || '').trim() || ('row-' + i),
          name: name,
          folderLink: (row[1] || '').trim(),
          customInfo: (row[2] || '').trim(),
          orderLink: (row[3] || '').trim(),
          orderNum: (row[4] || '').trim(),
          type: (row[5] || '').trim(),
          design: (row[6] || '').trim(),
          orderDate: (row[9] || '').trim(),
          rowIndex: i + 1
        });
      }
    });
    ordersData.sort(function(a, b) { return parseDate(a.orderDate) - parseDate(b.orderDate); });
    if (ordersData.length === 0) {
      app.innerHTML = '<div class="empty">No orders found.</div>';
      setStatus('error');
      return;
    }
    setStatus('loaded');
    buildFilters();
    renderOrders();
    document.getElementById('toolbar').style.display = 'block';
  }).catch(function(e) {
    setStatus('error');
    app.innerHTML = '<div class="error-state">Could not load sheet.<br><br><small>' + e.message + '</small></div>';
  });
}

function buildFilters() {
  var designs = {};
  ordersData.forEach(function(o) { if (o.design) designs[o.design] = true; });
  var keys = Object.keys(designs).sort();
  var html = '<button class="filter-btn active" id="filter-all" onclick="setFilter(\'all\')">All</button>';
  keys.forEach(function(d) {
    html += '<button class="filter-btn" id="filter-' + esc(d) + '" onclick="setFilter(\'' + esc(d) + '\')">' + esc(d) + '</button>';
  });
  document.getElementById('design-filters').innerHTML = html;
}

function setFilter(design) {
  activeFilter = design;
  document.querySelectorAll('#design-filters .filter-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('filter-' + (design === 'all' ? 'all' : esc(design)));
  if (btn) btn.classList.add('active');
  applyVisibility();
}

function toggleShowDone() {
  showDone = !showDone;
  var btn = document.getElementById('done-toggle');
  btn.classList.toggle('active', showDone);
  btn.textContent = showDone ? 'Hide Completed' : 'Show Completed';
  applyVisibility();
}

function applyVisibility() {
  var pending = 0, doneCount = 0;
  ordersData.forEach(function(o, i) {
    var card = document.getElementById('card-' + i);
    if (!card) return;
    var isDone = !!doneOrders[o.id];
    var matchesFilter = activeFilter === 'all' || o.design === activeFilter;
    var show = matchesFilter && (!isDone || showDone);
    card.classList.toggle('hidden', !show);
    if (matchesFilter) { isDone ? doneCount++ : pending++; }
  });
  document.getElementById('order-count').textContent =
    pending + ' pending · ' + doneCount + ' completed';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderOrders() {
  var app = document.getElementById('app');
  var html = '';
  ordersData.forEach(function(o, i) {
    var isDone = !!doneOrders[o.id];
    html += '<div class="order-card' + (isDone ? ' done' : '') + '" id="card-' + i + '">';
    html += '<div class="card-header" onclick="toggleCard(' + i + ')">';
    html += '<span class="row-num">' + o.rowIndex + '</span>';
    html += '<span class="order-name">' + esc(o.name) + '</span>';
    html += '<div class="order-meta">';
    if (o.type) html += '<span><span class="badge badge-type">' + esc(o.type) + '</span></span>';
    if (o.design) html += '<span><span class="badge badge-design">' + esc(o.design) + '</span></span>';
    if (o.orderNum) html += '<span>#' + esc(o.orderNum) + '</span>';
    if (o.orderDate) html += '<span class="date-label">' + formatDate(o.orderDate) + '</span>';
    html += '</div><span class="chevron">▼</span></div>';
    html += '<div class="card-body">';
    html += '<div class="section-label">Custom Info</div>';
    html += '<div class="custom-info-box">' + esc(o.customInfo) + '</div>';
    html += '<div class="section-label">Folder Path</div>';
    html += '<div class="folder-path">' + esc(o.folderLink || '—') + '</div>';
    html += '<div class="actions">';
    html += '<button class="btn btn-accent" id="cc-' + i + '" onclick="copyField(' + i + ',\'custom\')">Copy Custom Info</button>';
    html += '<button class="btn btn-primary" id="cf-' + i + '" onclick="copyField(' + i + ',\'folder\')">Copy Folder Path</button>';
    if (o.orderLink) html += '<a class="btn btn-secondary" href="' + esc(o.orderLink) + '" target="_blank">View Etsy Order</a>';
    if (!isDone) {
      html += '<button class="btn btn-done" id="cd-' + i + '" onclick="markDone(' + i + ')">Mark Complete</button>';
    } else {
      html += '<button class="btn btn-undone" id="cd-' + i + '" onclick="markUndone(' + i + ')">Undo Complete</button>';
    }
    html += '</div></div></div>';
  });
  app.innerHTML = html || '<div class="empty">No orders found.</div>';
  applyVisibility();
}

function toggleCard(i) { document.getElementById('card-' + i).classList.toggle('open'); }

function markDone(i) {
  var o = ordersData[i];
  doneOrders[o.id] = true;
  saveDone();
  var card = document.getElementById('card-' + i);
  card.classList.add('done');
  card.classList.remove('open');
  var btn = document.getElementById('cd-' + i);
  if (btn) { btn.className = 'btn btn-undone'; btn.textContent = 'Undo Complete'; btn.onclick = function(){ markUndone(i); }; }
  applyVisibility();
}

function markUndone(i) {
  var o = ordersData[i];
  delete doneOrders[o.id];
  saveDone();
  var card = document.getElementById('card-' + i);
  card.classList.remove('done');
  var btn = document.getElementById('cd-' + i);
  if (btn) { btn.className = 'btn btn-done'; btn.textContent = 'Mark Complete'; btn.onclick = function(){ markDone(i); }; }
  applyVisibility();
}

function copyField(i, field) {
  var o = ordersData[i];
  var text = field === 'custom' ? o.customInfo : o.folderLink;
  var btnId = field === 'custom' ? 'cc-' + i : 'cf-' + i;
  if (!text) return;
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  if (ok) { flashCopied(btnId); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function() { flashCopied(btnId); }); }
}

function flashCopied(btnId) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  var orig = btn.textContent;
  btn.classList.add('copied');
  btn.textContent = '✓ Copied!';
  setTimeout(function() { btn.classList.remove('copied'); btn.textContent = orig; }, 1800);
}

loadOrders();
</script>
</body>
</html>
